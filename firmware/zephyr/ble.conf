# DK-only BLE build. Enables the Ring Data Service (src/ble.c) on top of the
# sensor pipeline. Uses upstream Zephyr's software Link-Layer controller, so it
# needs no nRF Connect SDK / SoftDevice blobs.
#
# Build with:
#   west build -b nrf54l15dk/nrf54l15/cpuapp . -- -DEXTRA_CONF_FILE=ble.conf
#
# Not runnable in LabWired: the nRF54L radio is not modelled.
CONFIG_BT=y
CONFIG_BT_PERIPHERAL=y
CONFIG_BT_DEVICE_NAME="SmartRing"
